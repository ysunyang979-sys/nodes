name: 全自动节点测速 (每6小时更新)

on:
  schedule:
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:

jobs:
  run-speedtest:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取仓库文件
        uses: actions/checkout@v3

      - name: 2. 下载最新的测速内核
        run: |
          wget https://github.com/beck-8/subs-check/releases/latest/download/subs-check_Linux_x86_64.tar.gz
          tar -xzvf subs-check_Linux_x86_64.tar.gz
          chmod +x subs-check

      - name: 3. 开始极速测活并监控 (智能退出)
        run: |
          echo "🚀 测速引擎启动中..."
          # 【注意这里！必须带 -f config.yaml】
          ./subs-check -f config.yaml > run.log 2>&1 &
          PID=$!
          
          # 智能监控循环
          while true; do
            # 【注意这里！自带了防卡死报警】
            if ! kill -0 $PID 2>/dev/null; then
              echo "🚨 糟糕！测速内核异常退出了！下面是报错日志："
              cat run.log
              exit 1
            fi
            
            # 检查是否测速完成
            if grep -q "保存本地成功" run.log 2>/dev/null; then
              echo "✅ 检测到完成信号，强制终止内核！"
              kill -9 $PID
              break
            fi
            sleep 10
          done
          echo "🎉 本次测速圆满完成！"

      - name: 4. 把新鲜节点提交保存到 Github
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*
          git commit -m "Auto update nodes: $(date +'%Y-%m-%d %H:%M')" || true
          git push
